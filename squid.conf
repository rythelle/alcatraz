# Squid proxy configuration for Alcatraz

# ===== BASIC ACCESS =====
http_port 3128

# ===== DOMAIN WHITELIST =====
# Domains allowed for downloads and requests
acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubusercontent.com
acl allowed_domains dstdomain .npmjs.com
acl allowed_domains dstdomain .npmjs.org
acl allowed_domains dstdomain .pypi.org
acl allowed_domains dstdomain .files.pythonhosted.org
acl allowed_domains dstdomain .crates.io
acl allowed_domains dstdomain archive.ubuntu.com
acl allowed_domains dstdomain security.ubuntu.com
acl allowed_domains dstdomain .claude.ai
acl allowed_domains dstdomain .claude.com
acl allowed_domains dstdomain .claudecode.com
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .claudeusercontent.com
acl allowed_domains dstdomain .googleapis.com
acl allowed_domains dstdomain .openai.com
acl allowed_domains dstdomain .statsigapi.net
acl allowed_domains dstdomain .opencode.ai
acl allowed_domains dstdomain .sentry.io
acl allowed_domains dstdomain .models.dev

# Localhost and internal network always allowed
acl localhost src 127.0.0.1
acl private_network src 172.30.0.0/16

# ===== BLACKLIST: DNS-over-HTTPS (DoH) and exfiltration =====
# Prevents tools from bypassing the proxy by using DoH to resolve DNS directly
acl doh_domains dstdomain .dns.google
acl doh_domains dstdomain .cloudflare-dns.com
acl doh_domains dstdomain .doh.dns.apple.com
acl doh_domains dstdomain .dns.opendns.com
acl doh_domains dstdomain dns.quad9.net
acl doh_domains dstdomain .doh.la

# Block dangerous methods outside the allowed context
acl dangerous_methods method PUT DELETE PATCH

# ===== ACCESS RULES =====
# Block CONNECT (HTTPS tunnels) to domains outside the whitelist
acl CONNECT method CONNECT
http_access deny CONNECT !allowed_domains
http_access allow CONNECT allowed_domains

http_access deny doh_domains
http_access deny dangerous_methods

http_access allow localhost
http_access allow private_network
http_access allow allowed_domains
http_access deny all

# Avoid buffering on streaming connections (essential for AI CLIs)
always_direct allow allowed_domains
always_direct allow localhost
always_direct allow private_network

# ===== CACHE AND LOGGING CONFIG =====
cache_dir ufs /var/spool/squid 100 16 256
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log

# ===== TIMEOUTS =====
connect_timeout 60 seconds
read_timeout 300 seconds
request_timeout 300 seconds

# ===== BANDWIDTH CONTROL =====
# Limit download speed to prevent mass exfiltration
# 2MB/s per IP (enough for LLM APIs, low for exfiltration)
delay_pools 1
delay_class 1 1
delay_parameters 1 2000000/2000000
delay_access 1 allow allowed_domains
delay_access 1 deny all

# ===== PERFORMANCE =====
maximum_object_size 100 MB